<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>FUKASHIGI ADMIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<header class="admin-header">
  <div class="logo">FUKASHIGI ADMIN</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <a href="app.html" class="btn btn-outline btn-sm">アプリへ</a>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">ログアウト</button>
  </div>
</header>

<div class="admin-nav" id="adminNavBar">
  <button class="admin-nav-btn active" onclick="switchSection('dashboard',this)">ダッシュボード</button>
  <button class="admin-nav-btn" onclick="switchSection('members',this)">メンバー</button>
  <button class="admin-nav-btn" onclick="switchSection('events',this)">イベント</button>
  <button class="admin-nav-btn" onclick="switchSection('checkins',this)">チェックイン</button>
  <button class="admin-nav-btn" onclick="switchSection('points',this)">ポイント</button>
  <button class="admin-nav-btn" onclick="switchSection('notices',this)">お知らせ</button>
  <button class="admin-nav-btn" onclick="switchSection('chat',this)">チャット管理</button>
  <button class="admin-nav-btn" onclick="switchSection('qr',this)">QRコード</button>
</div>

<!-- ダッシュボード -->
<div id="sec-dashboard" class="admin-section active">
  <div class="admin-content">
    <div class="page-title">ダッシュボード</div>
    <div class="summary-grid">
      <div class="summary-card"><div class="s-val" id="dashMembers">—</div><div class="s-label">メンバー数</div></div>
      <div class="summary-card"><div class="s-val" id="dashEvents">—</div><div class="s-label">イベント数</div></div>
      <div class="summary-card"><div class="s-val" id="dashCheckins">—</div><div class="s-label">総チェックイン</div></div>
      <div class="summary-card"><div class="s-val" id="dashTodayCheckins">—</div><div class="s-label">本日来店</div></div>
    </div>
    <div class="section-title" style="margin-top:8px;">直近のイベント</div>
    <div id="dashEvents2"></div>
  </div>
</div>

<!-- メンバー管理 -->
<div id="sec-members" class="admin-section">
  <div class="admin-content">
    <div class="page-title">メンバー管理</div>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" class="form-input" id="memberSearch" placeholder="名前・メールで検索…" oninput="filterMembers()">
    </div>
    <!-- フィルター -->
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button class="tag-btn active" id="filterAll" onclick="setMemberFilter('all',this)">全員</button>
      <button class="tag-btn" id="filterActive" onclick="setMemberFilter('active',this)">有効</button>
      <button class="tag-btn" id="filterSuspended" onclick="setMemberFilter('suspended',this)">停止中</button>
    </div>
    <div id="memberList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- イベント管理 -->
<div id="sec-events" class="admin-section">
  <div class="admin-content">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
      <div class="page-title" style="margin-bottom:0;">イベント管理</div>
      <button class="btn btn-gold btn-sm" onclick="showCreateEventForm()">＋ 新規作成</button>
    </div>

    <div id="createEventForm" class="card" style="display:none;margin-bottom:20px;">
      <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:20px;">新規イベント作成</div>
      <div class="form-group">
        <label class="form-label">イベント名 *</label>
        <input type="text" class="form-input" id="evTitle" placeholder="第○回ポーカー大会">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">開催日 *</label>
          <input type="date" class="form-input" id="evDate">
        </div>
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <div class="select-wrap">
            <select class="form-select" id="evCategory">
              <option value="poker">ポーカー</option>
              <option value="smash">スマブラ</option>
              <option value="fishing">釣り</option>
              <option value="card">カード</option>
              <option value="other">その他</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">開始時間</label>
          <input type="time" class="form-input" id="evStartTime">
        </div>
        <div class="form-group">
          <label class="form-label">終了時間</label>
          <input type="time" class="form-input" id="evEndTime">
        </div>
        <div class="form-group">
          <label class="form-label">参加費（円）</label>
          <input type="number" class="form-input" id="evFee" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">定員（0=無制限）</label>
          <input type="number" class="form-input" id="evCapacity" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">説明</label>
        <textarea class="form-textarea" id="evDescription" placeholder="イベントの説明…"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">イベント画像URL（任意）</label>
        <input type="url" class="form-input" id="evImageUrl" placeholder="https://…">
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
          <input type="checkbox" id="evPublic" checked style="width:auto;accent-color:var(--gold);">
          <span style="font-size:14px;color:var(--text-sub);">公開する</span>
        </label>
      </div>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-gold" style="flex:1;" onclick="createEvent()">作成する</button>
        <button class="btn btn-outline" onclick="document.getElementById('createEventForm').style.display='none'">キャンセル</button>
      </div>
    </div>

    <div id="adminEventsList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- チェックイン履歴 -->
<div id="sec-checkins" class="admin-section">
  <div class="admin-content">
    <div class="page-title">チェックイン履歴</div>
    <div id="checkinHistory"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- ポイント管理 -->
<div id="sec-points" class="admin-section">
  <div class="admin-content">
    <div class="page-title">ポイント管理</div>
    <div class="card card-glow" style="margin-bottom:24px;">
      <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:18px;">ポイント / チップ 付与・減算</div>
      <div class="form-group">
        <label class="form-label">メンバー選択</label>
        <div class="select-wrap"><select class="form-select" id="ptMember"></select></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label class="form-label">種別</label>
          <div class="select-wrap">
            <select class="form-select" id="ptType">
              <option value="point_add">ポイント付与</option>
              <option value="point_sub">ポイント減算</option>
              <option value="chip_add">チップ付与</option>
              <option value="chip_sub">チップ減算</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">数量</label>
          <input type="number" class="form-input" id="ptAmount" min="1" placeholder="100">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">理由・メモ</label>
        <input type="text" class="form-input" id="ptReason" placeholder="例：イベント優勝ボーナス">
      </div>
      <button class="btn btn-gold btn-block" onclick="applyPoints()">実行する</button>
    </div>
    <div class="section-title" style="margin-top:0;">変更履歴</div>
    <div id="pointLogList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- お知らせ管理 -->
<div id="sec-notices" class="admin-section">
  <div class="admin-content">
    <div class="page-title">お知らせ管理</div>
    <div class="card" style="margin-bottom:24px;border-color:rgba(212,175,55,0.3);">
      <div style="font-size:14px;font-weight:700;color:var(--gold);margin-bottom:18px;">新規お知らせ投稿</div>
      <div class="form-group">
        <label class="form-label">タイトル *</label>
        <input type="text" class="form-input" id="noticeTitle" placeholder="お知らせタイトル">
      </div>
      <div class="form-group">
        <label class="form-label">本文 *</label>
        <textarea class="form-textarea" id="noticeBody" style="min-height:120px;" placeholder="内容を入力…"></textarea>
      </div>
      <div class="form-group">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
          <input type="checkbox" id="noticePinned" style="width:auto;accent-color:var(--gold);">
          <span style="font-size:14px;color:var(--text-sub);">固定表示にする</span>
        </label>
      </div>
      <button class="btn btn-gold btn-block" onclick="postNotice()">投稿する</button>
    </div>
    <div class="section-title" style="margin-top:0;">投稿済みお知らせ</div>
    <div id="noticeList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- チャット管理 -->
<div id="sec-chat" class="admin-section">
  <div class="admin-content">
    <div class="page-title">チャット管理</div>
    <!-- ルーム選択 -->
    <div class="tag-filter" id="adminChatRoomFilter">
      <button class="tag-btn active" onclick="loadAdminChat('global',this)">全体チャット</button>
    </div>
    <div id="adminChatList"><div class="loading"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- QRコード表示 -->
<div id="sec-qr" class="admin-section">
  <div class="admin-content">
    <div class="page-title">本日のQRコード</div>
    <div class="card" style="text-align:center;padding:32px 24px;">
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:28px;line-height:1.7;">
        このQRコードを会場に掲示してください。<br>メンバーがスキャンするとチェックインされます。<br>コードは本日のみ有効です。
      </p>
      <div style="display:flex;justify-content:center;margin-bottom:20px;">
        <div class="qr-display" id="qrCodeDisplay"></div>
      </div>
      <div style="font-family:'Inter',monospace;font-size:11px;color:var(--text-muted);" id="qrCodeText"></div>
    </div>
  </div>
</div>

<!-- メンバー詳細モーダル -->
<div class="modal-overlay" id="memberModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="memberModalTitle"></div>
      <button class="modal-close" onclick="closeMemberModal()">✕</button>
    </div>
    <div id="memberModalContent"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="firebase.js"></script>
<script src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STOCKR — クラウド在庫管理</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07080b;--sf:#0f1219;--sf2:#161b26;--sf3:#1c2233;
  --bd:#222b3e;--bd2:#2a3550;
  --ac:#7ee8a2;--acd:rgba(126,232,162,.11);--acd2:rgba(126,232,162,.05);
  --tx:#dce5f0;--txm:#475068;--txd:#7a88a6;
  --ok:#7ee8a2;--okd:rgba(126,232,162,.1);
  --dg:#ff6b6b;--dgd:rgba(255,107,107,.1);
  --warn:#ffd166;--warnd:rgba(255,209,102,.1);
  --r:12px;--rs:8px;
  --fd:'Syne',sans-serif;--fb:'Noto Sans JP',sans-serif;
  --hdr:52px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--tx);font-family:var(--fb);font-size:14px;overflow:hidden}
input,textarea,select,button{font-family:var(--fb)}
button{cursor:pointer}
a{color:inherit;text-decoration:none}

/* ═══ LOADING ═══ */
#loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .3s}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:30px;height:30px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:11px;color:var(--txm)}

/* ═══ AUTH ═══ */
#auth{position:fixed;inset:0;background:var(--bg);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#auth.on{display:flex}
.auth-wrap{width:100%;max-width:380px;padding:8px 0;animation:fadeUp .35s cubic-bezier(.34,1.4,.64,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-txt{font-family:var(--fd);font-size:34px;font-weight:800;letter-spacing:-1px}
.auth-logo-txt em{color:var(--ac);font-style:normal}
.auth-logo-sub{font-size:11px;color:var(--txm);margin-top:5px;letter-spacing:.06em}
.auth-tabs{display:flex;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:22px}
.auth-tab{flex:1;padding:11px;text-align:center;font-family:var(--fd);font-size:11px;font-weight:700;color:var(--txm);border:none;background:none;transition:all .2s;letter-spacing:.05em;cursor:pointer}
.auth-tab.on{background:var(--acd);color:var(--ac)}
.auth-sec{display:none;flex-direction:column;gap:13px}.auth-sec.on{display:flex}
.f{display:flex;flex-direction:column;gap:5px}
.f label{font-size:10px;color:var(--txd);font-family:var(--fd);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.f input{background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);padding:13px 14px;border-radius:var(--rs);font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
.f input:focus{border-color:var(--ac)}
.auth-btn{width:100%;padding:13px;background:var(--ac);color:#07080b;border:none;border-radius:var(--rs);font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:.04em;transition:all .18s;margin-top:2px}
.auth-err{min-height:18px;font-size:12px;color:var(--dg);text-align:center}

/* ═══ APP SHELL ═══ */
#app{display:none;flex-direction:column;height:100%}
#app.on{display:flex}
.hdr{height:var(--hdr);background:var(--sf);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;position:relative;z-index:50}
.hdr-logo{font-family:var(--fd);font-size:16px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;flex-shrink:0}
.hdr-logo em{color:var(--ac);font-style:normal}
.nav{display:flex;align-items:stretch;flex:1;overflow-x:auto;margin:0 4px}
.nav::-webkit-scrollbar{display:none}
.ntab{display:flex;align-items:center;gap:5px;padding:0 12px;height:var(--hdr);font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--txm);border:none;background:none;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0}
.ntab.on{color:var(--ac);border-bottom-color:var(--ac)}
.nbdg{background:var(--acd);color:var(--ac);font-size:10px;padding:1px 6px;border-radius:8px;font-weight:700}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--bd);flex-shrink:0}
.sync-dot.ok{background:var(--ok)}.sync-dot.sync{background:var(--warn);animation:blink .7s infinite alternate}.sync-dot.err{background:var(--dg)}
@keyframes blink{from{opacity:.3}to{opacity:1}}
.logout-btn{font-size:11px;color:var(--txm);background:none;border:1px solid var(--bd);padding:5px 12px;border-radius:5px;font-family:var(--fd);font-weight:700;transition:all .15s}

/* PAGES */
.pages{flex:1;overflow:hidden;position:relative}
.pg{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.pg.on{display:flex}

/* ═══════════════════════════════
   PAGE: REPORT
═══════════════════════════════ */
#pg-report{padding:20px; overflow-y:auto; background:var(--bg);}
.rep-header { margin-bottom: 20px; }
.rep-title { font-family: var(--fd); font-size: 18px; font-weight: 800; color: var(--tx); }
.rep-desc { font-size: 12px; color: var(--txm); margin-top: 4px; }
.rep-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; margin-bottom: 24px; }
.rep-box { background: var(--sf); border: 1.5px solid var(--bd); border-radius: var(--r); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
.rep-box.highlight { border-color: var(--ac); background: var(--acd2); }
.rep-box.highlight2 { border-color: var(--ok); background: var(--okd); }
.rep-lbl { font-size: 11px; color: var(--txm); font-family: var(--fd); font-weight: 700; letter-spacing: .05em; text-transform: uppercase; }
.rep-val { font-size: 28px; font-weight: 800; font-family: var(--fd); line-height: 1; }
.rep-val.ac { color: var(--ac); }
.rep-val.ok { color: var(--ok); }
.rep-val.dg { color: var(--dg); }

/* ═══════════════════════════════
   PAGE: INVENTORY (CART REMOVED)
═══════════════════════════════ */
#pg-inv{flex-direction:column}
.inv-panel{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden;}
.inv-toolbar{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.ptitle{font-family:var(--fd);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txm)}
.count-bdg{background:var(--acd);color:var(--ac);font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;font-family:var(--fd)}
.srch-wrap{position:relative;flex:1;min-width:120px;max-width:280px}
.srch-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txm);width:14px;height:14px;pointer-events:none}
.srch-in{width:100%;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);padding:9px 10px 9px 32px;border-radius:var(--rs);font-size:16px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.srch-in:focus{border-color:var(--ac)}.srch-in::placeholder{color:var(--txm)}

.inv-scroll{overflow-y:auto;flex:1;padding:14px}
.inv-scroll::-webkit-scrollbar{width:4px}.inv-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.inv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px}
.icard{background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;gap:10px;animation:cIn .18s ease}
.icard-img{width:100%;height:110px;background-color:var(--sf2);border-radius:var(--rs);background-size:contain;background-position:center;background-repeat:no-repeat;display:flex;align-items:center;justify-content:center;font-size:30px;color:var(--bd2);margin-bottom:2px}
.icard-name{font-family:var(--fd);font-weight:700;font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;white-space:normal;overflow:hidden;min-height:36px;}
.icard-row{display:flex;align-items:center;justify-content:space-between;gap:4px}
.icard-cost{font-size:13px;color:var(--ac);font-family:var(--fd);font-weight:700}
.stk-bdg{font-size:11px;font-weight:700;font-family:var(--fd);padding:3px 8px;border-radius:20px}
.stk-ok{background:var(--okd);color:var(--ok)}
.stk-warn{background:var(--warnd);color:var(--warn)}
.stk-empty{background:var(--dgd);color:var(--dg)}
.icard-qty{display:flex;align-items:center;gap:6px; margin-top:auto;}
.qb{width:32px;height:32px;border-radius:6px;border:1.5px solid var(--bd);background:none;color:var(--txd);font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .13s}
.qn{font-size:14px;font-weight:700;font-family:var(--fd);min-width:28px;text-align:center}
.dk-tag{background:var(--acd);color:var(--ac);padding:3px 7px;border-radius:4px;font-family:var(--fd);font-size:10px;font-weight:700}
.icard-acts{display:flex;gap:6px}
.ab{flex:1;padding:8px 4px;border-radius:6px;border:1.5px solid var(--bd);background:none;font-size:12px;color:var(--txm);transition:all .13s; white-space:nowrap;}
.ab.del{color:var(--dg);border-color:transparent}.ab.del:hover{border-color:var(--dg);background:var(--dgd)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;gap:10px;color:var(--txm);grid-column:1/-1;text-align:center}
.empty-ico{font-size:36px;opacity:.25}

/* ═══════════════════════════════
   PAGE: DECK
═══════════════════════════════ */
#pg-deck{flex-direction:row}
.dk-sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;background:var(--sf);overflow:hidden}
.dk-sidebar-head{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.dk-scroll{overflow-y:auto;flex:1;padding:10px;display:flex;flex-direction:column;gap:6px}
.dk-scroll::-webkit-scrollbar{width:4px}.dk-scroll::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
.dk-item{padding:10px 12px;background:var(--sf2);border:1.5px solid var(--bd);border-radius:var(--rs);cursor:pointer;transition:all .13s}
.dk-item.sel{border-color:var(--ac);background:var(--acd2)}
.dk-item-name{font-family:var(--fd);font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.dk-item-meta{font-size:10px;color:var(--txm);display:flex;gap:6px;flex-wrap:wrap}
.dsbdg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:5px;font-family:var(--fd)}
.dsb-draft{background:rgba(74,80,104,.2);color:var(--txm)}
.dsb-active{background:var(--acd);color:var(--ac)}
.dsb-sold{background:var(--okd);color:var(--ok)}

.dk-main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.dk-hbar{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--sf)}
.dk-name-in{background:none;border:none;color:var(--tx);font-family:var(--fd);font-size:16px !important;font-weight:700;outline:none;flex:1;min-width:0}
.status-sel{background:var(--sf2);border:1px solid var(--bd);color:var(--tx);padding:7px 10px;border-radius:6px;font-family:var(--fb);font-size:13px;outline:none;cursor:pointer}

.dk-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.stat-box{background:var(--sf2);border-radius:var(--rs);padding:10px 12px}
.stat-lbl{font-size:10px;color:var(--txm);font-family:var(--fd);letter-spacing:.04em;margin-bottom:4px}
.stat-val{font-family:var(--fd);font-size:14px;font-weight:800}
.stat-val.ac{color:var(--ac)}.stat-val.ok{color:var(--ok)}.stat-val.dg{color:var(--dg)}

.dk-body{display:flex;flex:1;overflow:hidden}
.dk-search-col{width:260px;flex-shrink:0;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.dsc-head{padding:10px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
.dsc-srch{display:flex;align-items:center;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--rs);overflow:hidden;transition:border-color .18s}
.dsc-srch-in{flex:1;background:none;border:none;color:var(--tx);padding:10px 4px;font-size:16px !important;outline:none}
.dsc-results{flex:1;overflow-y:auto}
.dsr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)}
.dsr-info{flex:1;min-width:0}
.dsr-name{font-size:13px;font-weight:700;font-family:var(--fd);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dsr-add{padding:8px 12px;background:var(--ac);color:#07080b;border:none;border-radius:5px;font-family:var(--fd);font-size:12px;font-weight:700;flex-shrink:0}

.dk-card-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg)}
.dk-ca-head{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--sf)}
.dk-ca-scroll{flex:1;overflow-y:auto;padding:14px}
.dk-card-grid{display:flex;flex-direction:column;gap:12px}
.dk-cg{display:flex;flex-direction:column;gap:6px}
.dk-cg-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.dk-cg-qty{font-family:var(--fd);font-size:13px;font-weight:700;color:var(--ac);min-width:30px;text-align:center}
.dk-thumbs{display:flex;flex-wrap:wrap;gap:6px}
.dk-thumb{position:relative;width:62px;flex-shrink:0}
.dk-thumb-ph{width:62px;height:86px;border-radius:6px;background:var(--sf2);background-size:cover;background-position:center;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--bd);border:2px solid transparent}
.dk-thumb-rm{position:absolute;top:4px;right:4px;width:20px;height:20px;background:var(--dg);border:none;border-radius:4px;color:#fff;font-size:12px;font-weight:700;display:none;align-items:center;justify-content:center;line-height:1}
.dk-thumb:hover .dk-thumb-rm{display:flex}
.dk-ca-footer{display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid var(--bd);margin-top:6px}

.dk-bottom{padding:14px;border-top:1px solid var(--bd);background:var(--sf);flex-shrink:0;display:flex;flex-direction:column;gap:12px;max-height:38vh;overflow-y:auto}
.price-section{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.price-box{background:var(--sf2);border-radius:var(--rs);padding:12px 14px;display:flex;flex-direction:column;gap:10px}
.pf{display:flex;flex-direction:column;gap:4px}
.pf label{font-size:10px;color:var(--txm);font-family:var(--fd);letter-spacing:.05em;text-transform:uppercase;font-weight:700}
.pf input{background:var(--sf3);border:1.5px solid var(--bd);color:var(--tx);padding:9px 12px;border-radius:var(--rs);font-size:16px !important;outline:none;transition:border-color .18s;-webkit-appearance:none;width:100%}
.profit-box{background:var(--acd2);border:1.5px solid rgba(126,232,162,.12);border-radius:var(--rs);padding:14px;display:flex;flex-direction:column;gap:6px}
.prow{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.prow .val{font-family:var(--fd);font-weight:700}
.prow .val.ac{color:var(--ac)}.prow .val.ok{color:var(--ok)}.prow .val.dg{color:var(--dg)}
.phr{border:none;border-top:1px solid var(--bd);margin:4px 0}
.memo-box textarea{width:100%;background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);padding:10px 12px;border-radius:var(--rs);font-size:16px !important;outline:none;resize:none;line-height:1.6;-webkit-appearance:none}
.no-sel{display:flex;flex:1;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--txm)}

.btn{padding:10px 16px;border-radius:var(--rs);font-family:var(--fd);font-size:14px;font-weight:700;border:none;transition:all .15s;cursor:pointer;line-height:1}
.btn-ac{background:var(--ac);color:#07080b}
.btn-ghost{background:none;color:var(--txm);border:1.5px solid var(--bd)}
.btn-dg{background:none;color:var(--dg);border:1.5px solid var(--dg)}
.btn-sm{padding:6px 12px;font-size:12px}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:400;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.overlay.on{display:flex}
.modal{background:var(--sf);border:1.5px solid var(--bd2);border-radius:14px;padding:20px;width:100%;max-width:420px;animation:mIn .18s ease; margin:auto;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-family:var(--fd);font-size:16px;font-weight:700;margin-bottom:16px}
.mfields{display:flex;flex-direction:column;gap:12px;margin-bottom:16px}
.mf{display:flex;flex-direction:column;gap:6px}
.mf label{font-size:11px;color:var(--txd);font-family:var(--fd);font-weight:700;letter-spacing:.07em;text-transform:uppercase}
.mf input,.mf textarea,.mf select{background:var(--sf2);border:1.5px solid var(--bd);color:var(--tx);padding:10px 12px;border-radius:var(--rs);font-size:16px !important;outline:none;transition:border-color .2s;-webkit-appearance:none;width:100%}
.mf input:focus,.mf textarea:focus,.mf select:focus{border-color:var(--ac)}
.mf textarea{resize:none;line-height:1.6}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mactions{display:flex;gap:10px;justify-content:flex-end}

.img-preview{width:100%;height:160px;background:var(--sf3);border:2px dashed var(--bd);border-radius:var(--rs);display:flex;align-items:center;justify-content:center;color:var(--txd);font-size:13px;text-align:center;background-size:contain;background-position:center;background-repeat:no-repeat;cursor:pointer;line-height:1.5;margin-bottom:12px}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--tx);color:var(--bg);padding:10px 22px;border-radius:50px;font-size:14px;font-weight:700;font-family:var(--fd);z-index:600;transition:all .28s;opacity:0;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--dg);color:#fff}
mark{background:rgba(126,232,162,.22);color:var(--ac);border-radius:2px;font-style:normal}

@media(max-width:680px){
  body { overflow-y: auto; }
  #app { height: auto; min-height: 100vh; display: flex; flex-direction: column; }
  .pages { flex: 1; overflow: visible; display: flex; flex-direction: column; }
  .pg { position: relative; inset: auto; flex: 1; display: none; flex-direction: column; overflow: visible; }
  .pg.on { display: flex; }
  
  .inv-grid { grid-template-columns: repeat(2,1fr); gap: 10px; }
  .inv-scroll { overflow-y: visible; padding-bottom: 40px; }
  
  #pg-deck { flex-direction: column; }
  .dk-sidebar { width: 100%; border-right: none; border-bottom: 2px solid var(--bd); max-height: none; }
  .dk-scroll { max-height: 240px; }
  
  .dk-main { overflow: visible; }
  .dk-stats { grid-template-columns: 1fr 1fr; }
  .dk-body { flex-direction: column; overflow: visible; }
  
  .dk-search-col { width: 100%; border-right: none; border-bottom: 2px solid var(--bd); max-height: none; }
  .dsc-results { max-height: 240px; }
  
  .dk-card-area { overflow: visible; border-bottom: 2px solid var(--bd); }
  .dk-ca-scroll { overflow: visible; padding-bottom: 20px; }
  
  .dk-bottom { max-height: none; overflow: visible; padding-bottom: 60px; }
  .price-section { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p>読み込み中…</p>
</div>

<div id="auth">
  <div class="auth-wrap">
    <div class="auth-logo">
      <div class="auth-logo-txt">STOCK<em>R</em></div>
      <div class="auth-logo-sub">在庫管理 &amp; デッキ販売ツール</div>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab on" onclick="authTab('login')">ログイン</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js';
import { getFirestore, doc, collection, addDoc, updateDoc, deleteDoc, onSnapshot, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCN0lhT5A95s4UTjpMJgOZmcRg-aHwNpak",
  authDomain: "zaiko2-d1fef.firebaseapp.com",
  projectId: "zaiko2-d1fef",
  storageBucket: "zaiko2-d1fef.firebasestorage.app",
  messagingSenderId: "699514971368",
  appId: "1:699514971368:web:417196f4ac40bb6a0e555d"
};

const fbApp  = initializeApp(firebaseConfig);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);

try { await setPersistence(auth, browserLocalPersistence); } catch(e) {}

let uid = null;
let items  = [];   
let decks  = [];   
let selDkId = null;
let unsubItems = null, unsubDecks = null;
let dkSrchQ = '';
let currentItemImage = null;

// Auth Functions
window.authTab = (t) => {
  document.querySelectorAll('.auth-tab').forEach((el,i) => el.classList.toggle('on', i===(t==='login'?0:1)));
  document.getElementById('sec-login').classList.toggle('on', t==='login');
  document.getElementById('sec-signup').classList.toggle('on', t==='signup');
  document.getElementById('auth-err').textContent = '';
};
window.doLogin = async () => {
  const email = document.getElementById('l-email').value.trim();
  const pw    = document.getElementById('l-pw').value;
  try { await signInWithEmailAndPassword(auth, email, pw); } catch(e) { document.getElementById('auth-err').textContent = 'ログインに失敗しました'; }
};
window.doSignup = async () => {
  const email = document.getElementById('s-email').value.trim();
  const pw    = document.getElementById('s-pw').value;
  const pw2   = document.getElementById('s-pw2').value;
  if (pw !== pw2) { document.getElementById('auth-err').textContent = 'パスワードが一致しません'; return; }
  try { await createUserWithEmailAndPassword(auth, email, pw); } catch(e) { document.getElementById('auth-err').textContent = '登録に失敗しました'; }
};
window.doLogout = async () => { if(unsubItems) unsubItems(); if(unsubDecks) unsubDecks(); await signOut(auth); };

onAuthStateChanged(auth, user => {
  document.getElementById('loading').classList.add('hide');
  if (user) {
    uid = user.uid;
    document.getElementById('auth').classList.remove('on');
    document.getElementById('app').classList.add('on');
    startListeners();
  } else {
    uid = null;
    document.getElementById('app').classList.remove('on');
    document.getElementById('auth').classList.add('on');
  }
});

function startListeners() {
  setSyncDot('sync');
  unsubItems = onSnapshot(collection(db,'users',uid,'items'), snap => {
    items = snap.docs.map(d=>({id:d.id,...d.data()}));
    items.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    window.renderGrid();
    window.renderDeckSearch();
    updateBadges();
    window.renderReport();
    setSyncDot('ok');
  });
  unsubDecks = onSnapshot(collection(db,'users',uid,'decks'), snap => {
    decks = snap.docs.map(d=>({id:d.id,...d.data()}));
    decks.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    renderDkList();
    window.renderGrid(); 
    updateBadges();
    window.renderReport();
    setSyncDot('ok');
  });
}

function setSyncDot(s) { document.getElementById('sync-dot').className = 'sync-dot' + (s?' '+s:''); }

window.goPage = (p) => {
  ['inv','deck','report'].forEach(x=>{
    const pg = document.getElementById('pg-'+x);
    const tab = document.getElementById('ntab-'+x);
    if(pg) pg.classList.toggle('on', x===p);
    if(tab) tab.classList.toggle('on', x===p);
  });
  if (p==='deck') { renderDkList(); window.renderDeckSearch(); }
  if (p==='report') { window.renderReport(); }
};

// Report logic
window.renderReport = () => {
  const monthSet = new Set();
  decks.forEach(dk => {
    if (dk.status === 'sold') {
      const t = dk.soldAt || (dk.createdAt?.seconds ? dk.createdAt.seconds * 1000 : Date.now());
      const d = new Date(t);
      const mStr = d.getFullYear() + '年' + String(d.getMonth() + 1).padStart(2, '0') + '月';
      monthSet.add(mStr);
    }
  });
  const monthArr = Array.from(monthSet).sort().reverse();
  const selEl = document.getElementById('rep-month-sel');
  const currentSel = selEl.value || 'all';
  let opts = `<option value="all"${currentSel==='all'?' selected':''}>全期間（累計）</option>`;
  monthArr.forEach(m => { opts += `<option value="${m}"${currentSel===m?' selected':''}>${m}</option>`; });
  selEl.innerHTML = opts;
  const targetMonth = selEl.value;

  let totalAsset = 0;
  items.forEach(item => { totalAsset += (item.stock || 0) * (item.cost || 0); });

  let totalSales = 0, totalFees = 0, totalProfit = 0, soldCount = 0;
  decks.forEach(dk => {
    if (dk.status === 'sold') {
      const t = dk.soldAt || (dk.createdAt?.seconds ? dk.createdAt.seconds * 1000 : Date.now());
      const d = new Date(t);
      const mStr = d.getFullYear() + '年' + String(d.getMonth() + 1).padStart(2, '0') + '月';
      if (targetMonth !== 'all' && targetMonth !== mStr) return;
      soldCount++;
      const cost = dkCost(dk);
      const sell = Number(dk.sellPrice) || 0;
      const feePct = (dk.feePercent ?? 10) / 100;
      const ship = dk.shippingCost ?? 210;
      const fee = sell ? Math.round(sell * feePct) : 0;
      const net = sell ? Math.round(sell * (1 - feePct)) - ship : 0;
      totalSales += sell; totalFees += (fee + (sell ? ship : 0)); totalProfit += (sell ? net - cost : 0);
    }
  });
  document.getElementById('rep-asset').textContent = `¥${totalAsset.toLocaleString()}`;
  document.getElementById('rep-sales').textContent = `¥${totalSales.toLocaleString()}`;
  document.getElementById('rep-fees').textContent = `¥${totalFees.toLocaleString()}`;
  const pEl = document.getElementById('rep-profit');
  pEl.textContent = `${totalProfit >= 0 ? '+' : ''}¥${totalProfit.toLocaleString()}`;
  pEl.className = 'rep-val ' + (totalProfit >= 0 ? 'ok' : 'dg');
  document.getElementById('rep-sold-cnt').textContent = `販売 ${soldCount}件`;
  document.getElementById('rep-margin').textContent = totalSales > 0 ? Math.round((totalProfit / totalSales) * 100) + '%' : '0%';
};

// Inventory logic
window.renderGrid = () => {
  const q    = document.getElementById('inv-srch')?.value.trim().toLowerCase()||'';
  const grid = document.getElementById('inv-grid');
  const list = q ? items.filter(i=>i.name.toLowerCase().includes(q)) : items;

  if (!items.length) {
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><p>まだ商品がありません。</p></div>`;
    return;
  }
  grid.innerHTML = list.map(item => {
    const avail = Math.max(0, (item.stock||0) - decks.reduce((s,dk)=>s+((dk.cards||[]).find(c=>c.itemId===item.id)?.qty||0),0));
    const usage = decks.flatMap(dk=>{const c=(dk.cards||[]).find(c=>c.itemId===item.id);return c?[{name:dk.name,qty:c.qty}]:[]});
    const imgHtml = item.image ? `<div class="icard-img" style="background-image:url(${item.image})"></div>` : `<div class="icard-img">🃏</div>`;

    return `<div class="icard ${usage.length?'used':''}">
      ${imgHtml}
      <div class="icard-name">${hl(item.name,q)}</div>
      <div class="icard-row">
        <span class="icard-cost">¥${(item.cost||0).toLocaleString()}</span>
        <span class="stk-bdg ${avail===0?'stk-empty':'stk-ok'}">残${avail}枚</span>
      </div>
      <div class="deck-tags">${usage.map(u=>`<span class="dk-tag">${u.name}×${u.qty}</span>`).join('')}</div>
      <div class="icard-qty">
        <button class="qb" onclick="window.chgStock('${item.id}',-1)">−</button>
        <span class="qn">${item.stock||0}</span>
        <button class="qb" onclick="window.chgStock('${item.id}',1)">＋</button>
      </div>
      <div class="icard-acts">
        <button class="ab" onclick="window.openItemModal('${item.id}')">編集</button>
        <button class="ab del" onclick="window.delItem('${item.id}')">削除</button>
      </div>
    </div>`;
  }).join('');
};

window.openItemModal = (id) => {
  const item = id ? items.find(i=>i.id===id) : null;
  document.getElementById('item-eid').value = id||'';
  document.getElementById('item-name').value = item?.name||'';
  document.getElementById('item-stock').value = item?.stock??'';
  document.getElementById('item-cost').value = item?.cost??'';
  document.getElementById('item-sell').value = item?.sell??'';
  document.getElementById('item-memo').value = item?.memo||'';
  currentItemImage = item?.image || null;
  const pv = document.getElementById('item-img-preview');
  pv.style.backgroundImage = currentItemImage ? `url(${currentItemImage})` : 'none';
  pv.innerHTML = currentItemImage ? '' : '📱 タップして画像を選択・撮影';
  window.openModal('modal-item');
};

window.handleImageUpload = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (event) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 300; let w=img.width, h=img.height;
      if(w>h && w>MAX){h*=MAX/w; w=MAX;} else if(h>MAX){w*=MAX/h; h=MAX;}
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      currentItemImage = canvas.toDataURL('image/jpeg', 0.8);
      const pv = document.getElementById('item-img-preview');
      pv.style.backgroundImage = `url(${currentItemImage})`; pv.innerHTML = '';
    };
    img.src = event.target.result;
  };
  reader.readAsDataURL(file);
};

window.saveItem = async () => {
  const id = document.getElementById('item-eid').value;
  const name = document.getElementById('item-name').value.trim();
  const stock = parseInt(document.getElementById('item-stock').value)||0;
  if (!name) return;
  const data = { name, stock, cost:parseInt(document.getElementById('item-cost').value)||0, sell:parseInt(document.getElementById('item-sell').value)||0, memo:document.getElementById('item-memo').value, image:currentItemImage };
  if (id) await updateDoc(doc(db,'users',uid,'items',id), data);
  else await addDoc(collection(db,'users',uid,'items'), {...data, createdAt:serverTimestamp()});
  window.closeModal('modal-item');
};

window.chgStock = async (id, d) => {
  const item = items.find(i=>i.id===id);
  if (item) await updateDoc(doc(db,'users',uid,'items',id), { stock: Math.max(0, (item.stock||0)+d) });
};

window.delItem = async (id) => { if(confirm('削除しますか？')) await deleteDoc(doc(db,'users',uid,'items',id)); };

window.searchOfficial = () => {
  const n = document.getElementById('item-name').value.trim();
  if(n) window.open(`https://dm.takaratomy.co.jp/card/?keyword=${encodeURIComponent(n)}`, '_blank');
};
window.searchMarket = (s) => {
  const n = document.getElementById('item-name').value.trim();
  if(!n) return;
  const k = encodeURIComponent(n);
  if(s==='mercari') window.open(`https://jp.mercari.com/search?keyword=${k}`, '_blank');
  if(s==='magi') window.open(`https://magi.camp/items/search?keyword=${k}`, '_blank');
  if(s==='yahoo') window.open(`https://auctions.yahoo.co.jp/search/search?p=${k}`, '_blank');
};

// Deck logic
window.newDeck = async () => {
  const ref = await addDoc(collection(db,'users',uid,'decks'), { name:'新規デッキ', status:'draft', cards:[], sellPrice:0, feePercent:10, shippingCost:210, memo:'', createdAt:serverTimestamp() });
  selDkId = ref.id; renderDkList();
};

function renderDkList() {
  const el = document.getElementById('dk-list');
  el.innerHTML = decks.map(dk=>{
    const cost = dkCost(dk);
    const sCls = {draft:'dsb-draft',active:'dsb-active',sold:'dsb-sold'}[dk.status];
    return `<div class="dk-item ${selDkId===dk.id?'sel':''}" onclick="window.selDeck('${dk.id}')">
      <div class="dk-item-name">${dk.name}</div>
      <div class="dk-item-meta"><span>¥${cost.toLocaleString()}</span><span class="dsbdg ${sCls}">${dk.status}</span></div>
    </div>`;
  }).join('');
  if (selDkId) renderDkMain(selDkId);
}
window.selDeck = (id) => { selDkId=id; renderDkList(); };

window.renderDeckSearch = () => {
  const el = document.getElementById('dk-srch-results'); if(!el) return;
  const q = dkSrchQ.toLowerCase();
  const list = q ? items.filter(i=>i.name.toLowerCase().includes(q)) : items;
  el.innerHTML = list.map(item=>{
    const avail = Math.max(0, (item.stock||0) - decks.reduce((s,dk)=>s+((dk.cards||[]).find(c=>c.itemId===item.id)?.qty||0),0));
    return `<div class="dsr"><div class="dsr-info"><div class="dsr-name">${item.name}</div><div style="font-size:10px;color:var(--txm)">在庫:${avail}</div></div>
      <button class="dsr-add" onclick="window.addToDk('${item.id}')" ${avail<=0?'disabled':''}>追加</button></div>`;
  }).join('');
};

window.addToDk = async (itemId) => {
  const dk = decks.find(d=>d.id===selDkId); if(!dk) return;
  const cards = JSON.parse(JSON.stringify(dk.cards||[]));
  const ex = cards.find(c=>c.itemId===itemId);
  if(ex) ex.qty++; else cards.push({itemId, qty:1});
  await updateDoc(doc(db,'users',uid,'decks',selDkId), { cards });
};

function renderDkMain(id) {
  const dk = decks.find(d=>d.id===id); if(!dk) return;
  const cost = dkCost(dk);
  const sell = dk.sellPrice||0;
  const fee = Math.round(sell * (dk.feePercent/100));
  const net = sell - fee - dk.shippingCost;
  const profit = net - cost;

  document.getElementById('dk-main').innerHTML = `
    <div class="dk-hbar">
      <input class="dk-name-in" value="${dk.name}" oninput="window.dkUpdate('${id}','name',this.value)">
      <select class="status-sel" onchange="window.dkStatusChange('${id}',this.value)">
        <option value="draft" ${dk.status==='draft'?'selected':''}>下書き</option>
        <option value="active" ${dk.status==='active'?'selected':''}>出品中</option>
        <option value="sold" ${dk.status==='sold'?'selected':''}>売却済</option>
      </select>
      <button class="btn btn-dg btn-sm" onclick="window.delDeck('${id}')">削除</button>
    </div>
    <div class="dk-stats">
      <div class="stat-box"><div class="stat-lbl">原価</div><div class="stat-val ac">¥${cost.toLocaleString()}</div></div>
      <div class="stat-box"><div class="stat-lbl">利益</div><div class="stat-val ${profit>=0?'ok':'dg'}">¥${profit.toLocaleString()}</div></div>
    </div>
    <div class="dk-body">
      <div class="dk-search-col">
        <div class="dsc-head"><div class="dsc-srch"><input class="dsc-srch-in" placeholder="検索…" oninput="dkSrchQ=this.value;window.renderDeckSearch()"></div></div>
        <div class="dsc-results" id="dk-srch-results"></div>
      </div>
      <div class="dk-card-area">
        <div class="dk-ca-scroll">${buildCardGrid(dk)}</div>
      </div>
    </div>
    <div class="dk-bottom">
      <div class="price-section">
        <div class="price-box">
          <div class="pf"><label>販売価格</label><input type="number" value="${sell||''}" oninput="window.dkUpdate('${id}','sellPrice',parseInt(this.value)||0)"></div>
          <div class="pf"><label>手数料%</label><input type="number" value="${dk.feePercent}" oninput="window.dkUpdate('${id}','feePercent',parseInt(this.value)||0)"></div>
          <div class="pf"><label>送料</label><input type="number" value="${dk.shippingCost}" oninput="window.dkUpdate('${id}','shippingCost',parseInt(this.value)||0)"></div>
        </div>
        <div class="profit-box">
          <div class="prow"><span>手取り</span><span class="val ac">¥${net.toLocaleString()}</span></div>
          <div class="prow"><span>利益</span><span class="val ${profit>=0?'ok':'dg'}">¥${profit.toLocaleString()}</span></div>
        </div>
      </div>
    </div>
  `;
  window.renderDeckSearch();
}

function buildCardGrid(dk) {
  return `<div class="dk-card-grid">` + (dk.cards||[]).map(c=>{
    const item = items.find(i=>i.id===c.itemId); if(!item) return '';
    const imgHtml = item.image ? `<div class="dk-thumb-ph" style="background-image:url(${item.image})"></div>` : `<div class="dk-thumb-ph">🃏</div>`;
    return `<div class="dk-cg"><div class="dk-cg-row"><span>${item.name}</span><div class="dk-cg-ctrl">
      <button class="qb" onclick="window.dkChgQ('${dk.id}','${item.id}',-1)">−</button><span class="dk-cg-qty">${c.qty}</span><button class="qb" onclick="window.dkChgQ('${dk.id}','${item.id}',1)">＋</button>
    </div></div><div class="dk-thumbs">${Array(c.qty).fill(`<div class="dk-thumb">${imgHtml}</div>`).join('')}</div></div>`;
  }).join('') + `</div>`;
}

window.dkUpdate = async (id, key, val) => { const d={}; d[key]=val; await updateDoc(doc(db,'users',uid,'decks',id), d); };
window.dkStatusChange = async (id, v) => { const d={status:v}; if(v==='sold') d.soldAt=Date.now(); await updateDoc(doc(db,'users',uid,'decks',id), d); };
window.dkChgQ = async (dkId, itemId, delta) => {
  const dk = decks.find(d=>d.id===dkId); if(!dk) return;
  const cards = JSON.parse(JSON.stringify(dk.cards||[]));
  const c = cards.find(c=>c.itemId===itemId); if(!c) return;
  c.qty += delta; if(c.qty<=0) cards.splice(cards.indexOf(c),1);
  await updateDoc(doc(db,'users',uid,'decks',dkId), { cards });
};
window.delDeck = async (id) => { if(confirm('削除しますか？')) await deleteDoc(doc(db,'users',uid,'decks',id)); };

// Utility
function dkCost(dk){ return (dk.cards||[]).reduce((s,c)=>{const i=items.find(x=>x.id===c.itemId); return s+(i?(i.cost||0)*c.qty:0)},0); }
function updateBadges(){ document.getElementById('nb-inv').textContent=items.length; document.getElementById('nb-deck').textContent=decks.length; document.getElementById('inv-cnt').textContent=items.length; document.getElementById('dk-cnt').textContent=decks.length; }
function hl(t,q){ if(!q) return t; const i=t.toLowerCase().indexOf(q.toLowerCase()); if(i<0) return t; return t.slice(0,i)+`<mark>${t.slice(i,i+q.length)}</mark>`+t.slice(i+q.length); }
window.openModal = (id) => document.getElementById(id).classList.add('on');
window.closeModal = (id) => document.getElementById(id).classList.remove('on');
function toast(m,e=false){ const t=document.getElementById('toast'); t.textContent=m; t.className='toast'+(e?' err':'')+' show'; setTimeout(()=>t.classList.remove('show'),2600); }

document.addEventListener('paste', (e) => {
  if(!document.getElementById('modal-item').classList.contains('on')) return;
  const items = (e.clipboardData || e.originalEvent.clipboardData).items;
  for (let item of items) {
    if (item.type.indexOf('image') === 0) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const MAX = 300; let w=img.width, h=img.height;
          if(w>h && w>MAX){h*=MAX/w; w=MAX;} else if(h>MAX){w*=MAX/h; h=MAX;}
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          currentItemImage = canvas.toDataURL('image/jpeg', 0.8);
          const pv = document.getElementById('item-img-preview');
          pv.style.backgroundImage = `url(${currentItemImage})`; pv.innerHTML = '';
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
  }
});
</script>

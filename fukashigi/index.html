<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>FUKASHIGI APP — ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<div class="login-page">

  <!-- ロゴ -->
  <div class="login-logo">
    <div class="app-title">FUKASHIGI</div>
    <div class="neon-line"></div>
    <div class="app-subtitle">Members Only</div>
  </div>

  <!-- ログインカード -->
  <div class="login-card">
    <div class="tab-switcher">
      <button class="tab-btn active" id="btnLogin" onclick="showTab('login')">ログイン</button>
      <button class="tab-btn" id="btnRegister" onclick="showTab('register')">新規登録</button>
    </div>

    <!-- ログインフォーム -->
    <div id="loginForm">
      <div id="loginError" class="error-msg"></div>
      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input type="email" class="form-input" id="loginEmail" placeholder="member@fukashigi.app" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード</label>
        <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-gold btn-block" id="loginBtn" onclick="doLogin()">
        ログイン
      </button>
    </div>

    <!-- 登録フォーム -->
    <div id="registerForm" style="display:none;">
      <div id="registerError" class="error-msg"></div>
      <div class="form-group">
        <label class="form-label">名前（ニックネーム可）</label>
        <input type="text" class="form-input" id="regName" placeholder="不思議太郎" maxlength="20">
      </div>
      <div class="form-group">
        <label class="form-label">メールアドレス</label>
        <input type="email" class="form-input" id="regEmail" placeholder="member@fukashigi.app" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">パスワード（6文字以上）</label>
        <input type="password" class="form-input" id="regPassword" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-gold btn-block" id="registerBtn" onclick="doRegister()">
        メンバー登録
      </button>
    </div>
  </div>

  <p style="margin-top:28px; font-size:11px; color:var(--text-muted); text-align:center; letter-spacing:0.1em;">
    FUKASHIGI TEAM — MEMBERS ONLY
  </p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script>
  auth.onAuthStateChanged(user => {
    if (user) {
      db.collection('users').doc(user.uid).get().then(doc => {
        if (doc.exists && doc.data().role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'app.html';
        }
      }).catch(() => { window.location.href = 'app.html'; });
    }
  });

  function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display    = isLogin ? '' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : '';
    document.getElementById('btnLogin').classList.toggle('active', isLogin);
    document.getElementById('btnRegister').classList.toggle('active', !isLogin);
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass  = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    const btn   = document.getElementById('loginBtn');

    if (!email || !pass) { showErr(errEl, 'メールアドレスとパスワードを入力してください'); return; }
    btn.disabled = true;
    btn.textContent = '認証中…';
    errEl.classList.remove('show');

    try {
      await auth.signInWithEmailAndPassword(email, pass);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'ログイン';
      const msgs = {
        'auth/user-not-found':    'このメールアドレスは登録されていません',
        'auth/wrong-password':        'パスワードが違います',
        'auth/invalid-email':         'メールアドレスの形式が正しくありません',
        'auth/invalid-credential':    'メールアドレスまたはパスワードが違います',
        'auth/too-many-requests':     'しばらく待ってから再試行してください',
        'auth/operation-not-allowed': 'Firebaseコンソールでメール/パスワード認証を有効にしてください',
        'auth/network-request-failed':'ネットワークエラーが発生しました',
      };
      showErr(errEl, msgs[e.code] || `ログインに失敗しました (${e.code})`);
    }
  }

  async function doRegister() {
    const name  = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass  = document.getElementById('regPassword').value;
    const errEl = document.getElementById('registerError');
    const btn   = document.getElementById('registerBtn');

    if (!name)           { showErr(errEl, '名前を入力してください'); return; }
    if (!email)          { showErr(errEl, 'メールアドレスを入力してください'); return; }
    if (pass.length < 6) { showErr(errEl, 'パスワードは6文字以上で入力してください'); return; }

    btn.disabled = true;
    btn.textContent = '登録中…';
    errEl.classList.remove('show');

    try {
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      const uid  = cred.user.uid;
      const memberNumber = 'F' + String(Date.now()).slice(-6);
      await db.collection('users').doc(uid).set({
        uid, name, email,
        iconUrl: '',
        memberNumber,
        role: 'member',
        points: 0, totalPoints: 0, chips: 0,
        rank: 'ROOKIE', title: '新参者',
        badges: [], checkInCount: 0, eventJoinCount: 0,
        comment: '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'メンバー登録';
      const msgs = {
        'auth/email-already-in-use':  'このメールアドレスはすでに使用されています',
        'auth/invalid-email':         'メールアドレスの形式が正しくありません',
        'auth/operation-not-allowed': 'Firebaseコンソールでメール/パスワード認証を有効にしてください（Authentication → Sign-in method）',
        'auth/network-request-failed':'ネットワークエラーが発生しました',
        'auth/weak-password':        'パスワードが弱すぎます',
      };
      showErr(errEl, msgs[e.code] || `登録に失敗しました (${e.code})`);
    }
  }

  function showErr(el, msg) {
    el.textContent = msg;
    el.classList.add('show');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const isLogin = document.getElementById('loginForm').style.display !== 'none';
      if (isLogin) doLogin(); else doRegister();
    }
  });
</script>
</body>
</html>
